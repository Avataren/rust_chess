seed: 42

training:
  batch_size: 2048
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  workers: 8
  pin_memory: true
  amp: true

model:
  input_dim: 12288   # 12 piece types × 64 squares × 16 king buckets
  hidden_dim: 512
  hidden2_dim: 32
  dropout: 0.1
  use_halfkp: true

loss:
  cp_weight: 0.3
  wdl_weight: 0.7

data:
  train_file: data/train_1m.jsonl
  val_file: data/val_1m.jsonl
  max_cp_abs: 1500

export:
  output_path: artifacts/eval_halfkp.onnx
