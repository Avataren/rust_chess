seed: 42

training:
  batch_size: 32768
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  workers: 8
  pin_memory: true
  amp: true
  persistent_workers: true
  prefetch_factor: 4

model:
  input_dim: 12288         # 12 piece types × 64 squares × 16 king buckets
  hidden_dim: 1024         # was 512; doubled L1 capacity (~25 MB model)
  hidden2_dim: 32
  dropout: 0.3
  dual_perspective: true   # EvalNetDual: shared EmbeddingBag, fc2=2048→32
  n_output_buckets: 8      # separate output weights per game phase

loss:
  cp_weight: 0.3
  wdl_weight: 0.7

data:
  train_file: data/train_20m.jsonl
  val_file: data/val_20m.jsonl
  max_cp_abs: 1500
