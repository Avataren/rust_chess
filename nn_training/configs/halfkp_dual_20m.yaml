seed: 42

training:
  batch_size: 32768
  epochs: 150
  lr: 0.001
  warmup_epochs: 5
  weight_decay: 0.0001
  grad_clip: 1.0
  workers: 8
  pin_memory: true
  amp: true
  persistent_workers: true
  prefetch_factor: 4

model:
  input_dim: 12288         # 12 piece types × 64 squares × 16 king buckets
  hidden_dim: 512          # safe choice for 20M positions; upgrade to 1024 at 50M+
  hidden2_dim: 32
  dropout: 0.3
  dual_perspective: true   # EvalNetDual: shared EmbeddingBag, fc2=1024→32
  n_output_buckets: 2      # endgame (≤16 pieces) vs opening/middlegame (17-32 pieces)

loss:
  cp_weight: 0.3
  wdl_weight: 0.7

data:
  train_file: data/train_d14_20m.jsonl
  val_file: data/val_d14_20m.jsonl
  max_cp_abs: 800
