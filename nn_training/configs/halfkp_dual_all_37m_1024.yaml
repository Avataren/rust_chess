seed: 137

training:
  batch_size: 32768
  epochs: 250
  lr: 0.001
  warmup_epochs: 5
  weight_decay: 0.0001
  grad_clip: 1.0
  workers: 8
  pin_memory: true
  amp: true
  persistent_workers: true
  prefetch_factor: 4

model:
  input_dim: 12288
  hidden_dim: 1024
  hidden2_dim: 32
  dropout: 0.3
  dual_perspective: true
  n_output_buckets: 3

loss:
  cp_weight: 0.3
  wdl_weight: 0.7

data:
  train_file: data/all_37m/train_all_37m.jsonl
  val_file:   data/all_37m/val_all_37m.jsonl
  max_cp_abs: 800
# Dataset: ~37M positions, 3 buckets
# hidden_dim: 1024 (doubled from 512) — requires HIDDEN1=1024 in neural_eval.rs before export
